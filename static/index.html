<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ParkIQ God Mode</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#070913;--panel:rgba(10,14,28,0.82);--border:rgba(255,255,255,0.07);--pri:#63b3ed;--sec:#9f7aea;--muted:#64748b;--txt:#f1f5f9}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
.tg{background:linear-gradient(135deg,#38bdf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Header */
header{position:absolute;top:0;left:0;right:0;z-index:2000;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(7,9,19,.95) 0%,transparent 100%);pointer-events:none}
.h-left{pointer-events:auto;display:flex;align-items:center;gap:12px}
.logo{font-size:22px;font-weight:800}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(192,132,252,.15);border:1px solid rgba(192,132,252,.35);color:#c084fc}
.h-right{pointer-events:auto;display:flex;align-items:center;gap:20px;background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--border);padding:8px 18px;border-radius:20px}
.hm{text-align:center}.hm .v{font-size:15px;font-weight:700;color:#34d399}.hm .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.hd{display:flex;align-items:center;gap:8px;border-left:1px solid var(--border);padding-left:16px}
.dot{width:10px;height:10px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;animation:pg 2s infinite}
.dot.red{background:#ef4444;box-shadow:0 0 12px #ef4444;animation:pr 1s infinite}
@keyframes pg{0%,100%{box-shadow:0 0 4px #10b981}50%{box-shadow:0 0 14px #10b981}}
@keyframes pr{0%,100%{box-shadow:0 0 4px #ef4444}50%{box-shadow:0 0 18px #ef4444}}
.ht{font-size:11px;font-weight:600;color:#10b981}.ht.red{color:#ef4444}

/* Map */
#map{position:absolute;inset:0;z-index:1}

/* Side Panel */
.panel{position:absolute;top:72px;left:20px;bottom:20px;width:360px;z-index:2000;background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.6)}

/* Controls */
.ctrl{padding:16px 18px;border-bottom:1px solid var(--border)}
.pt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.days{display:flex;gap:4px;margin-bottom:12px}
.db{flex:1;padding:7px 2px;background:rgba(255,255,255,.03);border:1px solid transparent;color:var(--muted);border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:.2s}
.db:hover{background:rgba(255,255,255,.07)}
.db.on{background:linear-gradient(135deg,rgba(56,189,248,.2),rgba(192,132,252,.2));border-color:rgba(192,132,252,.4);color:#fff}
.hdisp{font-size:26px;font-weight:800;text-align:center;margin-bottom:8px;font-variant-numeric:tabular-nums;text-shadow:0 0 20px rgba(56,189,248,.3)}
input[type=range].hs{width:100%;-webkit-appearance:none;height:5px;border-radius:5px;background:rgba(255,255,255,.1);outline:none;cursor:pointer}
input[type=range].hs::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--pri);box-shadow:0 0 10px var(--pri)}
.weather{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;padding:10px;background:rgba(0,0,0,.2);border-radius:10px}
.wi{display:flex;flex-direction:column;gap:3px}
.wl{font-size:9px;color:var(--muted);display:flex;justify-content:space-between;font-weight:600;text-transform:uppercase}
input[type=range].ws{width:100%;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.1);border-radius:3px;outline:none}
input[type=range].ws::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--pri);cursor:pointer}

/* Zone list */
.zl{flex:1;overflow-y:auto;padding:12px 16px}
.zl::-webkit-scrollbar{width:4px}
.zl::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.zc{padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:.2s}
.zc:hover{background:rgba(255,255,255,.06);transform:translateX(3px)}
.zc.sel{background:rgba(99,179,237,.1);border-color:rgba(99,179,237,.3)}
.zdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.zn{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.zt{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px}

/* Detail Drawer — slides up from bottom of panel */
.detail{border-top:1px solid var(--border);background:linear-gradient(0deg,rgba(99,179,237,.04),transparent);padding:0;max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(0.4,0,0.2,1)}
.detail.open{max-height:500px;overflow-y:auto;padding:14px 16px}
.detail::-webkit-scrollbar{width:4px}
.detail::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.dtitle{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Status strip */
.strip{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px;gap:2px}
.strip-seg{flex:1;border-radius:3px;transition:opacity .4s}
.strip-labels{display:flex;margin-bottom:12px}
.strip-labels span{flex:1;font-size:9px;color:var(--muted);text-align:center;font-weight:500;text-transform:uppercase}

/* Ensemble badge */
.ebadge{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;font-weight:600;padding:7px 12px;border-radius:8px;margin-bottom:10px;text-align:center}

/* SHAP */
.shap-hd{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.si{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.si:last-child{border:none}
.sup{color:#f87171;font-weight:700}.sdn{color:#34d399;font-weight:700}

/* AI Summary */
.ais{margin-top:10px;padding:10px 12px;background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(192,132,252,.07));border:1px solid rgba(192,132,252,.2);border-radius:8px;font-size:11px;line-height:1.6;color:#cbd5e1}
.ais-hd{font-size:9px;font-weight:700;color:#c084fc;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}

/* Analytics toggle */
.atog{width:100%;padding:8px 12px;background:rgba(99,179,237,.08);border:1px solid rgba(99,179,237,.2);color:var(--pri);border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;display:flex;justify-content:space-between;align-items:center;margin-top:10px;transition:.2s}
.atog:hover{background:rgba(99,179,237,.15)}
.adrawer{display:none;margin-top:6px}
.adrawer.open{display:block}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.akpi{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:7px;padding:8px}
.akpi .v{font-size:16px;font-weight:800}.akpi .l{font-size:9px;color:var(--muted);text-transform:uppercase}
.mr{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.mr:last-child{border:none}

/* Map */
.leaflet-container{background:var(--bg);font-family:inherit}
.leaflet-popup-content-wrapper{background:var(--panel);backdrop-filter:blur(12px);color:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:var(--panel)}
.leaflet-popup-content{margin:12px;font-size:12px}
.pm{width:42px;height:42px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(0.34,1.56,0.64,1)}
.pm:hover{transform:scale(1.2) translateY(-4px)}
.glow{position:absolute;width:100%;height:100%;border-radius:50%;animation:gpulse 2s infinite;z-index:-1}
@keyframes gpulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.7);opacity:0}}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(10,14,28,.95);backdrop-filter:blur(10px);border:1px solid rgba(99,179,237,.3);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:.4s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="h-left">
    <div class="logo tg">ParkIQ God Mode</div>
    <span class="badge">MLOps + Navigation</span>
  </div>
  <div class="h-right">
    <div class="hm"><div class="v">91.7%</div><div class="l">BNS Accuracy</div></div>
    <div class="hm"><div class="v" style="color:#fbbf24">0.031</div><div class="l">ECE Score</div></div>
    <div class="hd">
      <div class="dot" id="dot"></div>
      <div class="ht" id="ht">System Nominal</div>
    </div>
  </div>
</header>

<div id="map"></div>

<div class="panel">
  <div class="ctrl">
    <div class="pt">⏱ Time & Weather</div>
    <div class="days" id="dayBtns">
      <button class="db" data-d="0">Mo</button><button class="db" data-d="1">Tu</button>
      <button class="db" data-d="2">We</button><button class="db" data-d="3">Th</button>
      <button class="db" data-d="4">Fr</button><button class="db" data-d="5">Sa</button>
      <button class="db" data-d="6">Su</button>
    </div>
    <div class="hdisp" id="hdisp">09:00</div>
    <input type="range" class="hs" id="hs" min="0" max="23" value="9">
    <div class="weather">
      <div class="wi">
        <div class="wl"><span>Temp</span><span id="tv">18°C</span></div>
        <input type="range" class="ws" id="sT" min="0" max="45" value="18">
      </div>
      <div class="wi">
        <div class="wl"><span>Rain</span><span id="rv">0mm</span></div>
        <input type="range" class="ws" id="sR" min="0" max="20" value="0" step="0.5">
      </div>
      <div class="wi">
        <div class="wl"><span>Wind</span><span id="wv">4m/s</span></div>
        <input type="range" class="ws" id="sW" min="0" max="30" value="4">
      </div>
    </div>
  </div>

  <div class="pt" style="padding:12px 18px 4px">📍 Zones</div>
  <div class="zl" id="zl"></div>

  <div class="detail" id="det">
    <div class="dtitle" id="dtitle">—</div>

    <!-- Probability strip -->
    <div class="strip" id="strip"></div>
    <div class="strip-labels">
      <span>Empty</span><span>Low</span><span>Med</span><span>High</span><span>Full</span>
    </div>

    <!-- Ensemble badge -->
    <div class="ebadge" id="ebadge"></div>

    <!-- SHAP -->
    <div class="shap-hd">ⓘ Why? (Top Drivers)</div>
    <div id="shapRows"></div>

    <!-- AI Summary -->
    <div class="ais" id="ais" style="display:none">
      <div class="ais-hd">✦ AI Verdict</div>
      <div id="aisTxt"></div>
    </div>

    <!-- Analytics -->
    <button class="atog" onclick="togA()">
      <span>📊 Analytics</span><span id="aarr">▼</span>
    </button>
    <div class="adrawer" id="adraw">
      <div class="agrid" id="akpi"></div>
      <div id="amr"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CN=['Empty','Low','Medium','High','Full'];
const CC=['#10b981','#34d399','#fbbf24','#fb923c','#ef4444'];
const FN={Hour_Sin:'Hour',Hour_Cos:'Hour',DayOfWeek_Sin:'Day of Week',DayOfWeek_Cos:'Day of Week',Month_Sin:'Month',Month_Cos:'Month',DayOfMonth:'Day',Weekend:'Weekend',Temperature:'Temperature',DewPoint:'Dew Point',WindSpeed:'Wind Speed',Pressure:'Pressure',Rainfall:'Rainfall'};

let SD=null, day=1, hour=9, selZ=null, aOpen=false;
const map=L.map('map',{zoomControl:false}).setView([-37.8136,144.9631],14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);
const mks={};

function zc(cls,unc){return unc>0.12?'#8b5cf6':CC[cls]||'#94a3b8'}

function renderMap(preds){
  Object.values(mks).forEach(m=>map.removeLayer(m));
  Object.keys(mks).forEach(k=>delete mks[k]);
  SD.zones.forEach(z=>{
    const p=preds.find(p=>p.zone_id===z.id);if(!p)return;
    const c=zc(p.pred_class,p.uncertainty),unc=p.uncertainty>0.12;
    const gl=(unc||p.pred_class>=3)?`<div class="glow" style="background:${c}"></div>`:''
    const ico=L.divIcon({className:'',html:`<div style="position:relative;width:42px;height:42px">${gl}<div class="pm" style="background:${c}">${unc?'?':CN[p.pred_class][0]}</div></div>`,iconSize:[42,42],iconAnchor:[21,21]});
    const mk=L.marker([z.lat,z.lng],{icon:ico}).addTo(map);
    mk.on('click',()=>selZone(z.id));
    mks[z.id]=mk;
  });
}

function renderList(preds){
  const el=document.getElementById('zl');el.innerHTML='';
  [...SD.zones].sort((a,b)=>{
    const pa=preds.find(p=>p.zone_id===a.id);const pb=preds.find(p=>p.zone_id===b.id);
    return (pa?.pred_class||0)-(pb?.pred_class||0);
  }).forEach(z=>{
    const p=preds.find(p=>p.zone_id===z.id);if(!p)return;
    const c=zc(p.pred_class,p.uncertainty),unc=p.uncertainty>0.12;
    const d=document.createElement('div');
    d.className='zc'+(selZ===z.id?' sel':'');d.dataset.z=z.id;
    d.innerHTML=`<div class="zdot" style="background:${c};box-shadow:0 0 8px ${c}"></div><div class="zn">${z.name}</div><span class="zt" style="background:${c}22;color:${c}">${unc?'⚠ Unc':CN[p.pred_class]}</span>`;
    d.onclick=()=>selZone(z.id);
    el.appendChild(d);
  });
}

function refresh(){
  if(!SD)return;
  const preds=SD.predictions[`${day}_${hour}`]||[];
  renderMap(preds);renderList(preds);
}

async function selZone(zid){
  selZ=zid;
  document.querySelectorAll('.zc').forEach(c=>c.classList.toggle('sel',c.dataset.z===zid));
  const z=SD.zones.find(z=>z.id===zid);
  if(z)map.flyTo([z.lat,z.lng],16,{duration:1.2,easeLinearity:0.3});
  const det=document.getElementById('det');
  det.classList.add('open');
  document.getElementById('dtitle').textContent=z?.name||zid;
  document.getElementById('strip').innerHTML='<div style="width:100%;text-align:center;color:var(--muted);font-size:11px">Loading…</div>';
  document.getElementById('ebadge').innerHTML='';
  document.getElementById('shapRows').innerHTML='';
  document.getElementById('ais').style.display='none';

  let live;
  try{
    const r=await fetch('/api/live_predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({zone_id:zid,day,hour,air_temp:+document.getElementById('sT').value,wind_spd:+document.getElementById('sW').value,rain_mm:+document.getElementById('sR').value,dew_point:12,pressure:1012})});
    live=await r.json();
  }catch(e){console.error(e);return;}

  // 1. Strip
  const strip=document.getElementById('strip');
  strip.innerHTML='';
  const maxP=Math.max(...live.proba);
  live.proba.forEach((p,i)=>{
    const s=document.createElement('div');
    s.className='strip-seg';
    s.style.cssText=`background:${CC[i]};opacity:${0.2+0.8*(p/maxP)};flex:${Math.max(p,0.02)}`;
    strip.appendChild(s);
  });

  // 2. Ensemble badge
  const eb=document.getElementById('ebadge');
  if(live.model_conflict){
    eb.style.cssText='background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;';
    eb.innerHTML=`⚠️ Model conflict — BNN: ${live.pred_label}, XGB: ${live.xgb_label}`;
  } else if(live.uncertainty>0.12){
    eb.style.cssText='background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;';
    eb.innerHTML=`⚡ High epistemic uncertainty (σ=${(live.uncertainty*100).toFixed(1)}%)`;
  } else {
    eb.style.cssText='background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;';
    eb.innerHTML=`✅ Verified by dual-engine ensemble — ${live.pred_label} (${(live.confidence*100).toFixed(0)}% conf)`;
  }

  // 3. SHAP
  const sr=document.getElementById('shapRows');
  sr.innerHTML='';
  live.shap_explanations.forEach(e=>{
    const up=e.direction==='up';
    const name=FN[e.feature]||e.feature;
    const imp=Math.abs(e.impact).toFixed(3);
    sr.innerHTML+=`<div class="si"><span>${name}</span><span class="${up?'sup':'sdn'}">${up?'▲':' ▼'} ${up?'+':'−'}${imp}</span></div>`;
  });

  // 4. AI summary
  if(live.ai_summary){
    document.getElementById('aisTxt').textContent=live.ai_summary;
    document.getElementById('ais').style.display='block';
  }

  // 5. Drift radar
  const dot=document.getElementById('dot'),ht=document.getElementById('ht');
  if(live.drift_detected){
    dot.className='dot red';ht.className='ht red';
    ht.textContent=`⚠ Drift: ${live.drift_feature} (Z=${live.max_z_score})`;
  } else {
    dot.className='dot';ht.className='ht';
    ht.textContent='System Nominal';
  }
}

// Controls
document.getElementById('dayBtns').addEventListener('click',e=>{
  const b=e.target.closest('.db');if(!b)return;
  day=+b.dataset.d;
  document.querySelectorAll('.db').forEach(x=>x.classList.toggle('on',x===b));
  refresh();if(selZ)selZone(selZ);
});
const hs=document.getElementById('hs');
hs.addEventListener('input',()=>{hour=+hs.value;document.getElementById('hdisp').textContent=String(hour).padStart(2,'0')+':00';});
hs.addEventListener('change',()=>{refresh();if(selZ)selZone(selZ);});
[['sT','tv','°C'],['sR','rv','mm'],['sW','wv','m/s']].forEach(([sid,vid,u])=>{
  const s=document.getElementById(sid),v=document.getElementById(vid);
  s.addEventListener('input',()=>{v.textContent=s.value+u;});
  s.addEventListener('change',()=>{if(selZ)selZone(selZ);});
});

// Analytics
const MODELS=[
  {n:'BNS (Flagship)',a:91.7,c:'#c084fc'},{n:'DET (MLP)',a:96.2,c:'#38bdf8'},
  {n:'Random Forest',a:91.8,c:'#34d399'},{n:'BNN-Large',a:72.2,c:'#fbbf24'},
  {n:'BNN-LowKL',a:72.9,c:'#fb923c'},{n:'BNN-Small',a:64.4,c:'#94a3b8'},
  {n:'Log. Regression',a:67.2,c:'#94a3b8'}
];
function togA(){
  aOpen=!aOpen;
  document.getElementById('adraw').classList.toggle('open',aOpen);
  document.getElementById('aarr').textContent=aOpen?'▲':'▼';
  if(aOpen && !document.getElementById('akpi').innerHTML){
    document.getElementById('akpi').innerHTML=`
      <div class="akpi"><div class="v" style="color:#c084fc">91.7%</div><div class="l">BNS Accuracy</div></div>
      <div class="akpi"><div class="v" style="color:#10b981">0.031</div><div class="l">ECE Score</div></div>
      <div class="akpi"><div class="v" style="color:#38bdf8">8,760</div><div class="l">Real Data Hours</div></div>
      <div class="akpi"><div class="v" style="color:#fbbf24">500K</div><div class="l">Training Rows</div></div>`;
    document.getElementById('amr').innerHTML=MODELS.map(m=>`<div class="mr"><span style="color:${m.c};font-weight:600">${m.n}</span><span style="font-weight:700;color:#34d399">${m.a}%</span></div>`).join('');
  }
}

function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);}

async function init(){
  try{
    const r=await fetch('/api/data');SD=await r.json();
    document.querySelector('[data-d="1"]').classList.add('on');
    refresh();
    toast('✅ God Mode ready — click a zone for live AI analysis');
  }catch(e){console.error(e);}
}
init();
</script>
</body>
</html>
